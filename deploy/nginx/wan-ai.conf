# 万相AI · Nginx（静态由 Nginx 直出，/admin-api 反代 Node）
#
# 使用前请将下文两处 __APP_ROOT__ 换成你的项目根目录（如 /root/wan），
# 并确保 Node（PM2）监听 127.0.0.1:3000（勿对公网暴露 3000）。
#
# 安装后：
#   sudo cp __APP_ROOT__/deploy/nginx/wan-ai.conf /etc/nginx/conf.d/wan-ai.conf
#   sudo nginx -t && sudo systemctl reload nginx

upstream wan_ai_node {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  # 若有多个站点请勿写 default_server，避免与系统自带的 default.conf 冲突
  server_name _;

  # 改成你的仓库根目录；必须与 frontend/dist 实际路径一致
  root __APP_ROOT__/frontend/dist;
  index index.html;

  charset utf-8;
  # 需与 Node 端 MAX_UPLOAD_MB 一致或更大（默认 512MB 量级上传走 /admin-api/storage/upload）
  client_max_body_size 512m;

  gzip on;
  gzip_min_length 1k;
  gzip_comp_level 5;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

  # 接口：反代到 PM2 / Node
  location /admin-api/ {
    proxy_pass http://wan_ai_node;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 10s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }

  # 带 hash 的前端资源可长缓存
  location ~* ^/assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA：历史路由回退 index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}

# --- 可选：有域名与证书时启用 HTTPS + HTTP/2（浏览器端多路复用，缓解并发排队）---
# 1）将证书放到服务器，把域名、路径改成你的
